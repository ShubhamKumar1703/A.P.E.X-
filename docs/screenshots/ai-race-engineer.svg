<svg viewBox="0 0 800 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #09090b; }
    .card { fill: #121214; stroke: #27272a; stroke-width: 1; rx: 8px; }
    .msg-user { fill: #1f1f23; stroke: #3f3f46; rx: 6px; }
    .msg-engineer { fill: #18181b; stroke: #27272a; rx: 6px; }
    .btn-send { fill: #ff1801; rx: 6px; }
    .text-title { font-family: system-ui, sans-serif; font-weight: 800; fill: #ffffff; font-size: 13px; letter-spacing: 0.05em; }
    .text-value { font-family: monospace; fill: #ffffff; font-size: 11px; font-weight: bold; }
    .text-body { font-family: monospace; fill: #a1a1aa; font-size: 10px; }
    .text-body-highlight { font-family: monospace; fill: #ff1801; font-size: 10px; font-weight: bold; }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <!-- Layout Container -->
  <g transform="translate(15, 15)">
    <rect width="770" height="470" class="card" />
    
    <!-- Top Channel bar -->
    <rect x="0" y="0" width="770" height="40" fill="#18181b" stroke="#27272a" rx="4" />
    <circle cx="25" cy="20" r="4" fill="#3b82f6" />
    <text x="40" y="24" class="text-title">ACTIVE ENGINEER CHANNEL // GROQ STRATEGY ENGINE</text>
    
    <!-- Chat log Area -->
    <g transform="translate(20, 60)">
      
      <!-- Welcome Message -->
      <g transform="translate(0, 0)">
        <rect width="730" height="70" class="msg-engineer" />
        <text x="15" y="20" class="text-body" fill="#10b981">RACE ENGINEER // QWEN 32B</text>
        <text x="15" y="40" class="text-body">Pit Wall link established. Real-time telemetry, standings, and tyre stint metrics</text>
        <text x="15" y="54" class="text-body">loaded. Ask me any strategy question to initiate calculations.</text>
      </g>

      <!-- User Query -->
      <g transform="translate(230, 90)">
        <rect width="500" height="50" class="msg-user" />
        <text x="15" y="20" class="text-body" fill="#3b82f6">STRATEGY ENQUIRY // ANALYST</text>
        <text x="15" y="38" class="text-body" fill="#ffffff">Can Hamilton execute an undercut on Verstappen? What's the success rate?</text>
      </g>

      <!-- Engineer response -->
      <g transform="translate(0, 160)">
        <rect width="730" height="190" class="msg-engineer" />
        <text x="15" y="22" class="text-body" fill="#ff1801">RACE ENGINEER // ANALYZING STRATEGY DELTA</text>
        
        <text x="15" y="48" class="text-body">Based on Lap 42 spacing, Hamilton is currently trailing Verstappen by 1.512s.</text>
        
        <!-- Bullet points -->
        <text x="15" y="75" class="text-body-highlight">• Undercut Probability: 68%</text>
        <text x="15" y="92" class="text-body">• Stint Length Analysis: Hamilton's Medium tyres are 12 laps old; Verstappen's</text>
        <text x="15" y="106" class="text-body">  Hards are 16 laps old. Hamilton retains a pace advantage of +0.320s/lap.</text>
        <text x="15" y="122" class="text-body">• Pit stop window: The undercut window is active. Pitting Hamilton on Lap 44</text>
        <text x="15" y="136" class="text-body">  will force Verstappen to respond, but fresh tyre outlap delta gains 1.8s.</text>
        
        <text x="15" y="165" class="text-body" fill="#10b981">ADVISE: BOX HAMILTON FOR HARDS ON LAP 44. EXPECTED PIT DELTA: -22.4s.</text>
      </g>

    </g>

    <!-- Chat input Area -->
    <g transform="translate(20, 420)">
      <rect width="730" height="40" fill="#09090b" stroke="#27272a" rx="6" />
      <text x="15" y="24" class="text-body" fill="#71717a">Ask about race delta, tyre degradation, undercut potential...</text>
      
      <!-- Send Button -->
      <rect x="685" y="5" width="40" height="30" class="btn-send" />
      <!-- Arrow -->
      <path d="M700 20 L710 20 M706 15 L711 20 L706 25" stroke="#ffffff" stroke-width="1.5" fill="none" />
    </g>

  </g>
</svg>
